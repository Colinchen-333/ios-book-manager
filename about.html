<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我们 · About - Lumirain Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg {
            background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 50%, #000000 100%);
        }
        .gradient-bg-section {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 30%, #000000 70%, #0a0a0a 100%);
        }
        .text-gradient {
            background: linear-gradient(135deg, #E6C200 0%, #CC9500 30%, #E6C200 70%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .gold-glow {
            box-shadow: 0 0 40px rgba(230, 194, 0, 0.6), 0 0 80px rgba(230, 194, 0, 0.3), 0 0 120px rgba(230, 194, 0, 0.1);
        }
        .gold-glow-intense {
            box-shadow: 0 0 50px rgba(230, 194, 0, 0.8), 0 0 100px rgba(230, 194, 0, 0.4), 0 0 150px rgba(230, 194, 0, 0.2);
        }
        .gradient-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 50%, #000000 100%);
            border: 2px solid rgba(230, 194, 0, 0.5);
        }
    </style>
</head>
<body class="bg-black text-gray-100">
    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-black/90 backdrop-blur-sm shadow-sm" style="border-bottom: 1px solid rgba(230, 194, 0, 0.2);">

                    <a href="index.html" class="text-lg sm:text-xl font-bold" style="color: #E6C200;">Lumirain Studio</a>
                </div>
                <!-- Desktop Navigation -->
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="index.html" class="text-gray-300 px-3 py-2 text-sm font-medium transition-colors" onmouseover="this.style.color='#E6C200'" onmouseout="this.style.color='#d1d5db'">首页</a>
                        <a href="efficiency.html" class="text-gray-300 px-3 py-2 text-sm font-medium transition-colors" onmouseover="this.style.color='#E6C200'" onmouseout="this.style.color='#d1d5db'">七印</a>
                        <a href="impact.html" class="text-gray-300 px-3 py-2 text-sm font-medium transition-colors" onmouseover="this.style.color='#E6C200'" onmouseout="this.style.color='#d1d5db'">信息站</a>
                        <a href="about.html" class="px-3 py-2 text-sm font-medium" style="color: #E6C200;">关于</a>
                        <a href="contact.html" class="text-gray-300 px-3 py-2 text-sm font-medium transition-colors" onmouseover="this.style.color='#E6C200'" onmouseout="this.style.color='#d1d5db'">联系</a>
                    </div>
                </div>
                <!-- Mobile menu button -->
                <div class="md:hidden">
                    <button id="mobile-menu-button" type="button" class="text-gray-400 hover:text-gray-600 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-yellow-500 p-2" style="color: #E6C200;">
                        <span class="sr-only">Open main menu</span>
                        <i id="menu-icon" class="fas fa-bars text-lg"></i>
                    </button>
                </div>
            </div>
        </div>

            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 bg-black/95 backdrop-blur-sm" style="border-top: 1px solid rgba(230, 194, 0, 0.2);">

                <a href="impact.html" class="text-gray-300 hover:text-gray-100 block px-3 py-2 text-base font-medium border-l-4 border-transparent hover:border-yellow-500">信息站</a>
                <a href="about.html" class="text-gray-300 block px-3 py-2 text-base font-medium border-l-4 border-transparent" style="color: #E6C200; border-left-color: #E6C200;">关于</a>
                <a href="contact.html" class="text-gray-300 hover:text-gray-100 block px-3 py-2 text-base font-medium border-l-4 border-transparent hover:border-yellow-500">联系</a>
            </div>
        </div>

    <!-- Hero Section -->

        </div>
    </section>

                    <div class="w-24 h-24 sm:w-32 sm:h-32 rounded-full flex items-center justify-center text-black text-2xl sm:text-4xl font-bold mb-6 md:mb-0 md:mr-8 gold-glow" style="background: linear-gradient(135deg, #E6C200, #CC9500);">
                        C

                    <div class="flex-1 text-center md:text-left">

                        <p class="text-base sm:text-lg text-gray-200 mb-4">高一学生 / 创始开发者</p>
                        
                        <div class="space-y-2 sm:space-y-3">
                            <div class="flex items-center justify-center md:justify-start">
                                <i class="fas fa-trophy mr-2 sm:mr-3 text-gradient flex-shrink-0"></i>
                                <span class="text-gray-200 text-sm sm:text-base">牛津编程挑战赛OUCC金奖获得者</span>

                            <div class="flex items-center justify-center md:justify-start">

                        </div>

                    </div>

                    <p class="text-gray-200 leading-relaxed text-sm md:text-base">赋能每一个用户，让科技有温度</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-black text-white py-12 px-4" style="border-top: 1px solid rgba(230, 194, 0, 0.2);">
        <div class="max-w-7xl mx-auto text-center">
            <p class="text-gray-400">&copy; 2025 Lumirain Studio. Ignite | Nourish | Empower</p>
        </div>
    </footer>

    <script src="mobile-navigation.js"></script>
